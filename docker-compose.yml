services:
  mysql:
    image: mysql:8.0
    container_name: poddo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: poddo_playhouse
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: poddo-backend
    restart: always
    depends_on:
      - mysql
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: 1234
      DB_NAME: poddo_playhouse
      JWT_SECRET: super_secret_key_123
    ports:
      - "5000:5000"

volumes:
  mysql_data:
